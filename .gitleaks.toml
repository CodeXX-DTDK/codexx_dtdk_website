[allowlist]
description = "Global allowlist for language-specific artifacts"
paths = [
    # General
    '''node_modules''',
    # Dart / Flutter
    '''\.dart_tool/''',
    '''pubspec\.lock''',
    # Python
    '''__pycache__/''',
    '''venv/''',
    '''poetry\.lock''',
    # C# / .NET
    '''obj/''',
    '''bin/''',
    '''\.suo$''',
    '''\.user$''',
]

[[rules]]
description = "Python/Django Secret Key"
id = "python-secret-key"
regex = '''(?i)SECRET_KEY\s*[:=]\s*['"][a-z0-9%&!@#\^\*\(\)-_+]{30,}['"]'''
keywords = ["secret_key"]

[[rules]]
description = "C# Connection String"
id = "csharp-conn-string"
regex = '''(?i)Password\s*=\s*[^;]+|User\s+ID\s*=\s*[^;]+'''
path = '''\.(config|json|cs)$'''
keywords = ["password", "connectionstring"]

[[rules]]
description = "LuaU/Roblox Security Cookie"
id = "luau-roblox-cookie"
regex = '''_|WARNING:-DO-NOT-SHARE-.*_'''
keywords = ["do-not-share"]

[[rules]]
description = "Generic High-Entropy Token"
id = "generic-token"
# Scans for high-entropy strings in assignments - common in C++ headers or Dart constants
regex = '''(?i)(?:key|token|secret|auth|pwd|password|pass)\s*[:=]\s*["']([0-9a-zA-Z-_]{16,128})["']'''
entropy = 3.5
secretGroup = 1

# ── Codex licensing-service tokens ────────────────────────────────────────────
# These match anywhere in the file (incl. comments / docs), so leaks like the
# `.env.example` "sandbox: env-…v3" comments cannot slip past the assignment-
# anchored generic-token rule.

[[rules]]
description = "Keygen Environment Token (env-…v3)"
id = "keygen-env-token"
regex = '''env-[a-f0-9]{64}v3'''
keywords = ["env-"]

[[rules]]
description = "Keygen Admin / Product Token (admi-… / prod-…)"
id = "keygen-admin-token"
regex = '''(admi|prod)-[a-f0-9]{64}v3'''
keywords = ["admi-", "prod-"]

[[rules]]
description = "Polar Organization Access Token (polar_oat_…)"
id = "polar-oat"
regex = '''polar_oat_[A-Za-z0-9_-]{16,}'''
keywords = ["polar_oat_"]

[[rules]]
description = "Polar Webhook Signing Secret (polar_whs_…)"
id = "polar-whs"
regex = '''polar_whs_[A-Za-z0-9_-]{16,}'''
keywords = ["polar_whs_"]

[[rules]]
description = "Standard Webhooks Signing Secret (whsec_…)"
id = "standard-webhooks-secret"
regex = '''whsec_[A-Za-z0-9+/=_-]{20,}'''
keywords = ["whsec_"]

[[rules]]
description = "Resend API Key (re_…)"
id = "resend-api-key"
regex = '''re_[A-Za-z0-9]{20,}'''
keywords = ["re_"]

[[rules]]
description = "Vercel Personal / OIDC Token"
id = "vercel-token"
# Vercel tokens are 24-char alphanumeric; restrict context so we don't match generic identifiers.
regex = '''(?i)vercel[_-]?(?:token|api[_-]?key)\s*[:=]\s*["']?([A-Za-z0-9]{24})["']?'''
secretGroup = 1
keywords = ["vercel_token", "vercel-token", "vercel_api_key"]
