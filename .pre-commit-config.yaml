repos:
  # Pre-commit hooks for general code hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Codespell for spellchecking commit messages
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: spellcheck commit message
        stages: [commit-msg]

  # Scan for leaked secrets — TruffleHog OSS (Apache-2.0, free for commercial use).
  # Requires `trufflehog` in PATH: `brew install trufflehog` or
  # `curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh`.
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect secrets in your data.
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --config=.trufflehog.yaml --fail'
        language: system
        stages: [pre-commit, pre-push]
        pass_filenames: false

  # Prettier and ESLint for Astro + React documentation site
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: bash -c "npx mrm@2 lint-staged"
        language: system
