name: trufflehog
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  scan:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the action can diff PRs and scan all commits on push.
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          # On PRs the action auto-scopes to the diff; on push it scans full
          # history. --results=verified,unknown surfaces live-verified findings
          # plus unverifiable ones (custom detectors with no verify endpoint
          # land in `unknown`).
          extra_args: --results=verified,unknown --config=.trufflehog.yaml
